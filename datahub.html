 <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js">  </script>

  <main>
    <!-- page-specific content here -->
    <section class="section">
      <h1>DataHub – Upload & Visualize</h1>
      <p>Upload CSV files and quickly explore your data with charts.</p>

  <div class="upload-area">
    <input type="file" id="csv-file" accept=".csv" />
    <button id="load-sample">Load sample data</button>
  </div>

  <div id="data-preview"></div>

  <div class="chart-config">
    <label>
      X axis:
      <select id="x-column"></select>
    </label>
    <label>
      Y axis:
      <select id="y-column"></select>
    </label>
    <button id="draw-chart">Draw chart</button>
  </div>

  <canvas id="chart" height="120"></canvas>
</section>

<script src="assets/js/datahub.js"></script>
