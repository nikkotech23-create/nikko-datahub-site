<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nikko DataHub – Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <img src="assets/img/logo.png" class="logo-top" alt="Nikko DataHub Logo">

    <nav class="main-nav">
      <a href="index.html">Search</a>
      <a href="datahub.html">DataHub</a>
      <a href="videos.html">Videos</a>
    </nav>

    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
  </header>

  <main>
    <div class="mega-search">
      <input id="megaQuery" type="text" placeholder="Search everywhere…">
      <button onclick="megaSearch()">Search</button>
    </div>
    
    <!-- SEARCH SECTION -->
    <section class="section">
      <h1>Search Nikko DataHub</h1>
      <p>Search across videos, datasets, and knowledge pages.</p>

      <div class="search-box">
        <input id="search-input" type="text" placeholder="Search data, videos, topics..." />
        <button id="search-btn">Search</button>
      </div>

      <div id="search-results"></div>
    </section>

    <!-- CHAT SECTION -->
    <section class="section">
      <h2>Chat with NikkoBot</h2>
      <div class="chat-container">
        <div id="chat-log"></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="Ask about data, games, computing..." />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </section>

    <!-- SUPPORTER SECTION -->
    <section class="section supporter-card">

      <!-- SMALL LOGO ABOVE BUTTON -->
      <img src="assets/img/logo.png" class="logo-small" alt="Nikko DataHub Small Logo">

      <!-- SUPPORT BUTTON -->
      <a href="YOUR-LINK-HERE" class="support-btn">Become a Supporter</a>

    </section>

  </main>

  <footer class="site-footer">
    
  <div class="social-buttons">
    <a href="https://x.com/nikkodatahub" target="_blank" class="btn-x">X</a>
    <a href="https://youtube.com/@nikkodatahub" target="_blank" class="btn-yt">YT</a>
    <a href="https://instagram.com/nikkodatahub" target="_blank" class="btn-ig">IG</a>
  </div>

  <p>© 2026 Nikko DataHub · Built with HTML5 / CSS / JavaScript</p>
</footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>

</body>
</html>
