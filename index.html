<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nikko DataHub – Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <img src="assets/img/logo.png" class="logo-top" alt="Nikko DataHub Logo">

    <nav class="main-nav">
      <a href="index.html">Search</a>
      <a href="datahub.html">DataHub</a>
      <a href="videos.html">Videos</a>
    </nav>

    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
  </header>

  <main>

    <!-- MEGA SEARCH BAR -->
    <div class="mega-search">
      <input id="megaQuery" type="text" placeholder="Search everywhere…">
      <button onclick="megaSearch()">Search</button>
    </div>

    <!-- SEARCH SECTION -->
    <section class="section">
      <h1>Search Nikko DataHub</h1>
      <p>Search across videos, datasets, and knowledge pages.</p>

      <div class="search-box">
        <input id="search-input" type="text" placeholder="Search data, videos, topics..." />
        <button id="search-btn">Search</button>
      </div>

      <div id="search-results"></div>
    </section>

    <!-- CHAT SECTION -->
    <section class="section">
      <h2>Chat with NikkoBot</h2>
      <div class="chat-container">
        <div id="chat-log"></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="Ask about data, games, computing..." />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </section>

    <!-- SUPPORTER SECTION -->
    <section class="section supporter-card">
      <img src="assets/img/logo.png" class="logo-small" alt="Nikko DataHub Small Logo">
      <a href="YOUR-LINK-HERE" class="support-btn">Become a Supporter</a>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="social-buttons">
      <a href="https://x.com/nikkodatahub" target="_blank" class="btn-x">X</a>
      <a href="https://youtube.com/@nikkodatahub" target="_blank" class="btn-yt">YT</a>
      <a href="https://instagram.com/nikkodatahub" target="_blank" class="btn-ig">IG</a>
    </div>

    <p>© 2026 Nikko DataHub · Built with HTML5 / CSS / JavaScript</p>
  </footer>

  <!-- MEGA SEARCH FUNCTION (must load BEFORE external scripts) -->
  <script>
    function megaSearch() {
      const q = encodeURIComponent(document.getElementById("megaQuery").value);

      const urls = [
        `https://www.google.com/search?q=${q}`,
        `https://www.bing.com/search?q=${q}`,
        `https://duckduckgo.com/?q=${q}`,
        `https://search.brave.com/search?q=${q}`,
        `https://search.yahoo.com/search?p=${q}`,

        `https://www.youtube.com/results?search_query=${q}`,
        `https://www.dailymotion.com/search/${q}`,
        `https://vimeo.com/search?q=${q}`,

        `https://en.wikipedia.org/wiki/Special:Search?search=${q}`,
        `https://stackoverflow.com/search?q=${q}`,

        `https://www.bbc.co.uk/search?q=${q}`,
        `https://www.cnn.com/search?q=${q}`,
        `https://www.reuters.com/site-search/?query=${q}`,
        `https://apnews.com/search?q=${q}`,
        `https://www.aljazeera.com/Search/?q=${q}`,
        `https://www.theguardian.com/search?q=${q}`,

        `https://www.digi24.ro/cautare?q=${q}`,
        `https://www.hotnews.ro/cautare?keyword=${q}`,
        `https://www.libertatea.ro/?s=${q}`
      ];

      urls.forEach(url => window.open(url, "_blank"));
    }
  </script>

  <!-- EXTERNAL SCRIPTS (load AFTER megaSearch) -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>

</body>
</html>
